<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Name Slip Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f5f5f5;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    box-sizing:border-box;
}

button{
    padding:12px 20px;
    border:none;
    background:#007bff;
    color:white;
    cursor:pointer;
    border-radius:5px;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

#printArea{
    margin-top:20px;
}

.page{
    width:210mm;
    min-height:297mm;
    margin:auto;
    background:white;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:repeat(4,1fr);
    gap:6px;
    padding:8px;
    box-sizing:border-box;
}

.slip{
    border:2px solid #000;
    display:flex;
    align-items:center;
    padding:8px;
    height:65mm;
    box-sizing:border-box;
}

.photo{
    width:45%;
    height:100%;
    border:1px solid #999;
    object-fit:cover;
}

.details{
    width:55%;
    padding-left:10px;
}

.school{
    font-size:16px;
    font-weight:bold;
    margin-bottom:8px;
}

.name{
    font-size:22px;
    font-weight:bold;
    margin-bottom:8px;
}

.info{
    font-size:16px;
    margin-bottom:5px;
}

@media print{
    .container{
        box-shadow:none;
        padding:0;
    }

    .form-section,
    .print-btn{
        display:none;
    }

    body{
        background:white;
        margin:0;
    }

    .page{
        width:100%;
        min-height:auto;
        padding:0;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="form-section">
        <h2>School Name Slip Generator</h2>

        <input type="text" id="school" placeholder="School Name">

        <input type="text" id="name" placeholder="Student Name">

        <input type="text" id="class" placeholder="Class">

        <input type="text" id="division" placeholder="Division">

        <input type="file" id="photo" accept="image/*">

        <button onclick="generateSlips()">Generate 8 Slips</button>
        <button class="print-btn" onclick="window.print()">Print</button>
    </div>

    <div id="printArea"></div>

</div>

<script>
function generateSlips(){

    const school = document.getElementById('school').value;
    const name = document.getElementById('name').value;
    const cls = document.getElementById('class').value;
    const div = document.getElementById('division').value;
    const photoInput = document.getElementById('photo');

    if(!photoInput.files[0]){
        alert("Please select a photo");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        let html = '<div class="page">';

        for(let i=0;i<8;i++){

            html += `
            <div class="slip">

                <img src="${e.target.result}" class="photo">

                <div class="details">
                    <div class="school">${school}</div>

                    <div class="name">${name}</div>

                    <div class="info"><b>Class:</b> ${cls}</div>

                    <div class="info"><b>Division:</b> ${div}</div>
                </div>

            </div>
            `;
        }

        html += '</div>';

        document.getElementById('printArea').innerHTML = html;
    }

    reader.readAsDataURL(photoInput.files[0]);
}
</script>

</body>
</html>
